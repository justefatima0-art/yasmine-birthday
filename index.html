<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For Yasmine 💗</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(135deg, #ffd6e7, #ffeefc, #dfe9ff);
}

/* 🔐 login */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(#ffd6e7, #0b0b1a);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
    color: white;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #ff4f9a;
    color: white;
    cursor: pointer;
}

/* 🌍 scene */
#scene {
    display: none;
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

/* 🌙 moon */
#moon {
    position: absolute;
    width: 120px;
    top: 50px;
    left: -150px;
    animation: move 40s linear infinite;
}

@keyframes move {
    from {left: -150px;}
    to {left: 110%;}
}

/* 🦌 deer */
.deer {
    position: absolute;
    bottom: 60px;
    width: 170px;
    animation: move 12s linear infinite;
}

/* 🐇 rabbits */
.rabbit {
    position: absolute;
    bottom: 40px;
    width: 80px;
    animation: jump 2.5s infinite;
}

@keyframes jump {
    0% {transform: translateY(0);}
    50% {transform: translateY(-60px);}
    100% {transform: translateY(0);}
}

/* 🌧️ rain */
.rain {
    position: absolute;
    width: 2px;
    height: 18px;
    background: white;
    opacity: 0.6;
    animation: fall linear infinite;
}

@keyframes fall {
    from {transform: translateY(-100vh);}
    to {transform: translateY(100vh);}
}

/* ⚡ flash */
.flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
}

/* 💌 message box */
.message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 85%;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(255,255,255,0.75);
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    color: #333;
    font-size: 18px;
    line-height: 1.8;
}
</style>
</head>

<body>

<!-- 🎧 music -->
<source src="brooklyn-baby.mp3" type="audio/mpeg">
</audio>

<!-- 🔐 login -->
<div id="login">
    <h2>💗 أدخل كلمة السر</h2>
    <input type="password" id="pass" placeholder="••••••">
    <button onclick="check()">دخول</button>
</div>

<div id="flash" class="flash"></div>

<!-- 🌍 scene -->
<div id="scene">

    <img id="moon" src="https://i.imgur.com/9XH1XyS.png">
    <img class="deer" src="https://i.imgur.com/6XQZbXy.png">

    <img class="rabbit" style="left:30%" src="https://i.imgur.com/2yaf2wb.png">
    <img class="rabbit" style="left:70%" src="https://i.imgur.com/2yaf2wb.png">

    <div class="message">
        <h2>💗 رسالة لكِ 💗</h2>
        <p id="message"></p>
    </div>

</div>

<script>

/* 🔐 password */
let password = "yasmine";

/* 💌 full message */
const text = `وااععهه يااسميننعهه ايلاافيووو ءموااحهه علابالي بلي عندك 28 يوم هكاك ونتي تستناايي في وش درتلكك واضنن انك متوقعتيهاشش المهمم كل عاامم ونتيي بخيرر ججييرليي😭🤏 وانشاء الله تعود مرت عليك 14 سنة كاملهعهه كنتي فرحاانهعهه فيهاا ولعقوبةة لسنوااتت جديدة من عمركك الي نتمنى اني نكوونن فيهمم باسكوو والله اعشقكك واحبكك😭💕ونتمنالكك سنواات قادمةة احسنن وافضلل من سنوات الي فاتوو ونتمنى انوو تكونيي فرحاانعه فيهمم بااسكوو الي تفرحكك تفرحني اكثرر منكك والي تنويك تنويني اكثرر منكك 😭🙏ياااربيي ولاا عمر 14`;

let i = 0;

/* ✨ typing effect */
function typeWriter(){
    if(i < text.length){
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 30);
    }
}

/* 🔐 login check */
function check(){
    let p = document.getElementById("pass").value;

    if(p === password){
        document.getElementById("login").style.display = "none";
        document.getElementById("scene").style.display = "block";

        document.getElementById("music").play();

        startRain();
        lightning();

        typeWriter();
    } else {
        alert("كلمة السر خاطئة 💔");
    }
}

/* 🌧️ rain */
function startRain(){
    for(let i=0;i<150;i++){
        let r = document.createElement("div");
        r.className = "rain";
        r.style.left = Math.random()*100 + "vw";
        r.style.animationDuration = (Math.random()*1+0.5)+"s";
        document.body.appendChild(r);
    }
}

/* ⚡ lightning */
function lightning(){
    setInterval(()=>{
        let flash = document.getElementById("flash");
        flash.style.opacity = "0.8";
        setTimeout(()=>flash.style.opacity="0",120);
    }, 5000);
}

</script>

</body>
</html>
