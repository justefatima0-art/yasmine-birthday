<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gift For You 💖</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* شاشة البداية */
#startScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
transition:opacity 0.8s ease;
}

#startBtn{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ffb6c1;
cursor:pointer;
font-weight:bold;
}

/* المحتوى */
#content{
display:none;
padding-top:40px;
}

/* رسالة */
#message{
width:80%;
margin:auto;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
line-height:1.8;
}

/* عناصر متحركة */
.fall{
position:absolute;
font-size:18px;
animation:drop 8s linear infinite;
}

@keyframes drop{
0%{transform:translateY(-50px);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* انفجار */
.burst{
position:absolute;
font-size:20px;
animation:burstAnim 1.5s ease-out forwards;
}

@keyframes burstAnim{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(2);opacity:0;}
}
</style>
</head>

<body>
<div style="
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(255,182,193,0.15), transparent);
pointer-events:none;
"></div>
<!-- 🎁 شاشة البداية -->
<div id="startScreen">
<h1>🎁 A Gift For You</h1>
<button id="startBtn" onclick="start()">🎁 Open Your Surprise 💖</button>
</div>

<!-- 💖 المحتوى -->
<div id="content">

<h1>💖 For You Only 💖</h1>

<button onclick="showMessage()">Open Message 💌</button>

<div id="message" style="display:none;">
يااسمينعه 💖<br><br>

إيلافيووو 🤍✨<br>
هذا مش مجرد موقع… هذا إحساس 💌<br><br>

كل لحظة في حياتك تستاهل حب وهدوء 🌙<br><br>

الأرانب، الغزلان، المطر، القمر… يشبهونك 🌸<br>
هادئة… جميلة… مختلفة 💖<br><br>

I LOVE YOU 🤍
</div>

<audio id="music" loop>
<source src="Lana Del Rey - Brooklyn Baby (Official Audio)(mp3j.cc).mp3" type="audio/mpeg">
</audio>

</div>

<script>

/* 🎁 فتح الهدية */
function start(){
document.getElementById("startScreen").style.opacity="0";

setTimeout(()=>{
document.getElementById("startScreen").style.display="none";
document.getElementById("content").style.display="block";
document.getElementById("music").play();

burst();
},800);
}

/* ✨ انفجار */
function burst(){
for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="burst";
s.innerHTML="✨";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);

setTimeout(()=>{s.remove()},1500);
}
}

/* 💌 الرسالة */
function showMessage(){
document.getElementById("message").style.display="block";
}

/* 🌧️ مطر */
function rain(){
let drop=document.createElement("div");
drop.innerHTML="🌧️";
drop.style.position="absolute";
drop.style.left=Math.random()*100+"vw";
drop.style.top="-20px";
drop.style.fontSize="18px";
drop.style.animation="drop 6s linear";
document.body.appendChild(drop);

setTimeout(()=>{drop.remove()},6000);
}
setInterval(rain,500);

/* 🌸 عناصر عشوائية */
let symbols=["🌸","✨","🌙","💖"];
for(let i=0;i<60;i++){
let d=document.createElement("div");
d.className="fall";
d.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(Math.random()*5+4)+"s";
d.style.fontSize=(Math.random()*18+10)+"px";
document.body.appendChild(d);
}

</script>

</body>
</html>
