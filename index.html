<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد سعيد يا ياسمين 💖</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:linear-gradient(180deg,#ffeef7,#ffffff);
    text-align:center;
    color:#444;
    overflow-x:hidden;
}

header{ padding:60px 20px; }

h1{
    color:#ff6fae;
    font-size:3em;
}

.card{
    background:white;
    width:90%;
    max-width:700px;
    margin:20px auto;
    padding:25px;
    border-radius:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.btn{
    background:#ff8fbc;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:30px;
    cursor:pointer;
}

#secret{
    display:none;
    margin-top:20px;
    color:#ff5c9d;
    font-weight:bold;
}

.anim{
    position:fixed;
    font-size:25px;
    animation:fall 8s linear infinite;
    opacity:0.7;
    pointer-events:none;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(100vh);}
}
</style>
</head>

<body>

<!-- 🎵 الصوت (مهم) -->
<audio id="music" loop>
  <source src="brooklyn-baby.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic(){
    document.getElementById("music").play();
}

// تشغيل عند أول ضغط في الصفحة
document.addEventListener("click", playMusic, { once:true });
</script>

<header>
<h1>🎂 عيد ميلاد سعيد يا ياسمين 🎂</h1>
<p>إلى أجمل ياسمين 🤍🌷</p>
</header>

<div class="card">

<h2>💌 رسالة خاصة</h2>

<p>
وااععهه يااسمين 💖<br>
كل عام وأنتِ بخير 🌸
</p>

<button class="btn" onclick="document.getElementById('secret').style.display='block'">
اضغطي للمفاجأة 🎁
</button>

<div id="secret">
💖 أحبك بزاف بزاف 💖
</div>

</div>

<!-- 🌸 زينة -->
<div class="anim" style="left:10%">🌸</div>
<div class="anim" style="left:30%">🐰</div>
<div class="anim" style="left:50%">✨</div>
<div class="anim" style="left:70%">🌷</div>
<div class="anim" style="left:90%">💖</div>

</body>
</html>
