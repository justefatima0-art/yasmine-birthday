<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For Yasmine 💗 Cinematic World</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
}

/* شاشة الدخول */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(#ffd6e7, #0b0b1a);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
    color: white;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #ff4f9a;
    color: white;
    cursor: pointer;
}

/* المشهد */
#scene {
    display: none;
    width: 100%;
    height: 100vh;
    position: relative;
    background: linear-gradient(to top, #0b0b1a, #1a1a3a);
}

/* قمر */
#moon {
    position: absolute;
    width: 120px;
    top: 60px;
    left: -150px;
    animation: moonMove 40s linear infinite;
}

@keyframes moonMove {
    from {left: -150px;}
    to {left: 110%;}
}

/* غزال HD */
.deer {
    position: absolute;
    bottom: 60px;
    width: 180px;
    animation: deerMove 12s linear infinite;
}

@keyframes deerMove {
    from {left: -200px;}
    to {left: 110%;}
}

/* أرانب */
.rabbit {
    position: absolute;
    bottom: 40px;
    width: 80px;
    animation: jump 2.5s infinite;
}

@keyframes jump {
    0% {transform: translateY(0);}
    50% {transform: translateY(-60px);}
    100% {transform: translateY(0);}
}

/* مطر */
.rain {
    position: absolute;
    width: 1.5px;
    height: 20px;
    background: white;
    opacity: 0.6;
    animation: fall linear infinite;
}

@keyframes fall {
    from {transform: translateY(-100vh);}
    to {transform: translateY(100vh);}
}

/* برق */
.flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
}

</style>
</head>

<body>

<!-- 🔐 دخول -->
<div id="login">
    <h2>💗 أدخل كلمة السر</h2>
    <input type="password" id="pass" placeholder="••••••">
    <button onclick="check()">دخول</button>
</div>

<!-- 🎧 موسيقى -->
<audio id="music" loop>
  <source src="Lana Del Rey - Brooklyn Baby (Official Audio)(mp3j.cc).mp3" type="audio/mpeg">
</audio>

<div id="flash" class="flash"></div>

<div id="scene">

    <!-- 🌙 القمر -->
    <img id="moon" src="https://i.imgur.com/9XH1XyS.png">

    <!-- 🦌 غزال -->
    <img class="deer" src="https://i.imgur.com/6XQZbXy.png">

    <!-- 🐇 أرانب -->
    <img class="rabbit" style="left:30%" src="https://i.imgur.com/2yaf2wb.png">
    <img class="rabbit" style="left:70%" src="https://i.imgur.com/2yaf2wb.png">

</div>

<script>

/* كلمة السر من اختيارك */
let password = "YASMINE1930"; // 👈 غيّرها هنا

function check(){
    let p = document.getElementById("pass").value;
    if(p === password){
        document.getElementById("login").style.display = "none";
        document.getElementById("scene").style.display = "block";
        document.getElementById("music").play();
        startRain();
        lightning();
    } else {
        alert("كلمة السر خاطئة 💔");
    }
}

/* 🌧️ مطر واقعي */
function startRain(){
    for(let i=0;i<200;i++){
        let r = document.createElement("div");
        r.className = "rain";
        r.style.left = Math.random()*100 + "vw";
        r.style.animationDuration = (Math.random()*1+0.5) + "s";
        document.body.appendChild(r);
    }
}

/* ⚡ برق */
function lightning(){
    setInterval(()=>{
        let flash = document.getElementById("flash");
        flash.style.opacity = "0.8";
        setTimeout(()=>flash.style.opacity="0",100);
    }, 5000);
}

</script>

</body>
</html>
